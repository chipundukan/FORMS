<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Job Application Form</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    fieldset {
      border: 2px solid #007bff;
      border-radius: 8px;
      padding: 20px;
      background-color: #fff;
      display: none;
    }
    fieldset.active {
      display: block;
    }
    legend {
      color: #007bff;
      font-weight: bold;
    }
    .btn-group {
      margin-top: 15px;
    }
    .step {
      display: inline-block;
      width: 20%;
      text-align: center;
      padding: 10px;
      background-color: #e9ecef;
      border-radius: 5px;
      margin-right: 5px;
      font-weight: bold;
    }
    .step.active {
      background-color: #007bff;
      color: #fff;
    }
    .step.completed {
      background-color: #28a745;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">Professional Job Application Form</h2>

  <!-- Step indicators -->
  <div class="mb-3">
    <div class="step active" id="step1">Personal</div>
    <div class="step" id="step2">Position</div>
    <div class="step" id="step3">Interests</div>
    <div class="step" id="step4">Availability</div>
    <div class="step" id="step5">CV & Message</div>
  </div>

  <form id="multiForm">

    <!-- Page 1: Personal Information -->
    <fieldset class="active">
      <legend>Personal Information</legend>
      <div class="mb-3">
        <label for="fullname" class="form-label">Full Name *</label>
        <input type="text" id="fullname" class="form-control" name="fullname">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email *</label>
        <input type="email" id="email" class="form-control" name="email">
      </div>
      <div class="mb-3">
        <label for="telephone" class="form-label">Telephone *</label>
        <input type="text" id="telephone" class="form-control" name="telephone">
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <input type="text" id="address" class="form-control" name="address">
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-primary" onclick="nextPage(1)">Next</button>
      </div>
    </fieldset>

    <!-- Page 2: Position Information -->
    <fieldset>
      <legend>Position Information</legend>
      <div class="mb-3">
        <label for="jobtitle" class="form-label">Desired Job Title *</label>
        <select id="jobtitle" class="form-select" name="jobtitle">
          <option value="">Select a position</option>
          <option value="Account Executive">Account Executive</option>
          <option value="Business Development">Business Development</option>
          <option value="Inside Sales">Inside Sales</option>
          <option value="Sales Manager">Sales Manager</option>
          <option value="VP Sales">VP Sales</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Employment Type *</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="employment" value="Part-time contract">
          <label class="form-check-label">Part-time contract</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="employment" value="Part-time permanent">
          <label class="form-check-label">Part-time permanent</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="employment" value="Full-time contract">
          <label class="form-check-label">Full-time contract</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="employment" value="Full-time permanent">
          <label class="form-check-label">Full-time permanent</label>
        </div>
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" onclick="prevPage(2)">Previous</button>
        <button type="button" class="btn btn-primary" onclick="nextPage(2)">Next</button>
      </div>
    </fieldset>

    <!-- Page 3: Areas of Interest -->
    <fieldset>
      <legend>Areas of Interest *</legend>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="interest" value="Account Executive">
        <label class="form-check-label">Account Executive</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="interest" value="Business Development">
        <label class="form-check-label">Business Development</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="interest" value="Inside Sales">
        <label class="form-check-label">Inside Sales</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="interest" value="Sales Manager">
        <label class="form-check-label">Sales Manager</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="interest" value="VP Sales">
        <label class="form-check-label">VP Sales</label>
      </div>
      <div class="mb-3 mt-3">
        <label class="form-label">Willing to Relocate?</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="relocate" value="Yes">
          <label class="form-check-label">Yes</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="relocate" value="No">
          <label class="form-check-label">No</label>
        </div>
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" onclick="prevPage(3)">Previous</button>
        <button type="button" class="btn btn-primary" onclick="nextPage(3)">Next</button>
      </div>
    </fieldset>

    <!-- Page 4: Availability -->
    <fieldset>
      <legend>Availability</legend>
      <div class="mb-3">
        <label for="startdate" class="form-label">Earliest Start Date</label>
        <input type="date" id="startdate" class="form-control" name="startdate">
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" onclick="prevPage(4)">Previous</button>
        <button type="button" class="btn btn-primary" onclick="nextPage(4)">Next</button>
      </div>
    </fieldset>

    <!-- Page 5: CV Upload & Additional Message -->
    <fieldset>
      <legend>CV & Additional Message</legend>
      <div class="mb-3">
        <label for="cv" class="form-label">Upload CV (PDF only)</label>
        <input type="file" id="cv" class="form-control" name="cv" accept=".pdf">
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Additional Message</label>
        <textarea id="message" class="form-control" name="message" rows="4"></textarea>
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" onclick="prevPage(5)">Previous</button>
        <button type="submit" class="btn btn-success">Submit</button>
      </div>
    </fieldset>

  </form>
</div>

<script>
let currentPage = 1;

function showPage(page) {
  const fieldsets = document.querySelectorAll('fieldset');
  const steps = document.querySelectorAll('.step');
  fieldsets.forEach((fs, index) => fs.classList.remove('active'));
  fieldsets[page-1].classList.add('active');

  steps.forEach((s, index) => {
    s.classList.remove('active','completed');
    if(index < page-1) s.classList.add('completed');
    else if(index === page-1) s.classList.add('active');
  });
}

function nextPage(page) {
  if(validatePage(page)) {
    currentPage++;
    showPage(currentPage);
  }
}

function prevPage(page) {
  currentPage--;
  showPage(currentPage);
}

function validatePage(page) {
  if(page === 1){
    const name = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim();
    const telephone = document.getElementById("telephone").value.trim();
    if(!name || !email || !telephone){
      alert("Please complete all required fields on Personal Information.");
      return false;
    }
  }
  if(page === 2){
    const jobtitle = document.getElementById("jobtitle").value;
    const employment = document.querySelector('input[name="employment"]:checked');
    if(!jobtitle || !employment){
      alert("Please select a job title and employment type.");
      return false;
    }
  }
  if(page === 3){
    const interests = document.querySelectorAll('input[name="interest"]:checked');
    if(interests.length === 0){
      alert("Please select at least one area of interest.");
      return false;
    }
  }
  return true;
}

// Initial page display
showPage(currentPage);

// Form submission
document.getElementById("multiForm").onsubmit = function() {
  if(!validatePage(currentPage)) return false;
  alert("Form submitted successfully!");
  return true;
}
</script>

</body>
</html>
