<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Job Application Form</h2>

        <form id="jobForm">

            <!-- Personal Information -->
            <h5>Personal Information</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
                </div>
            </div>

            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="tel" id="phone" class="form-control" placeholder="Phone Number" required>
            </div>

            <!-- Job Details -->
            <h5>Job Details</h5>

            <div class="mb-3">
                <input type="text" id="position" class="form-control" placeholder="Position Applied For" required>
            </div>

            <!-- Area of Interest -->
            <div class="mb-3">
                <label class="form-label">Area of Interest</label>
                <select id="interest" class="form-select" required>
                    <option value="">Select Area</option>
                    <option>Software Development</option>
                    <option>Networking</option>
                    <option>Cybersecurity</option>
                    <option>Data Analysis</option>
                </select>
            </div>

            <!-- Relocation -->
            <div class="mb-3">
                <label class="form-label">Willing to Relocate?</label>
                <select id="relocate" class="form-select" required>
                    <option value="">Select Option</option>
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <!-- Availability -->
            <div class="mb-3">
                <label class="form-label">Availability</label>
                <input type="date" id="availability" class="form-control" required>
            </div>

            <!-- Experience -->
            <div class="mb-3">
                <input type="number" id="experience" class="form-control" placeholder="Years of Experience">
            </div>

            <!-- Education -->
            <h5>Education</h5>
            <div class="mb-3">
                <input type="text" id="education" class="form-control" placeholder="Highest Qualification" required>
            </div>

            <!-- Skills -->
            <h5>Skills</h5>
            <div class="mb-3">
                <textarea id="skills" class="form-control" rows="3" placeholder="List your skills"></textarea>
            </div>

            <!-- Upload CV -->
            <h5>Upload CV</h5>
            <div class="mb-3">
                <input type="file" id="cv" class="form-control" accept=".pdf,.doc,.docx">
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <button type="reset" class="btn btn-secondary">Reset</button>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>

        </form>

        <p id="output" class="text-center mt-3"></p>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
