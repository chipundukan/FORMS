
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Job Application Form</h2>

        <form id="jobForm">

            <!-- Personal Info -->
            <h5>Personal Information</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                </div>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="tel" class="form-control" id="phone" placeholder="Phone Number" required>
            </div>

            <!-- Job Details -->
            <h5>Job Details</h5>
            <div class="mb-3">
                <input type="text" class="form-control" id="position" placeholder="Position Applied For" required>
            </div>

            <div class="mb-3">
                <input type="number" class="form-control" id="experience" placeholder="Years of Experience">
            </div>

            <!-- Education -->
            <h5>Education</h5>
            <div class="mb-3">
                <input type="text" class="form-control" id="education" placeholder="Highest Qualification" required>
            </div>

            <!-- Skills -->
            <h5>Skills</h5>
            <div class="mb-3">
                <textarea class="form-control" id="skills" rows="3" placeholder="List your skills"></textarea>
            </div>

            <!-- Upload -->
            <h5>Upload CV</h5>
            <div class="mb-3">
                <input type="file" class="form-control" id="cv">
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <button type="reset" class="btn btn-secondary">Reset</button>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>

        </form>

        <p id="output" class="text-success mt-3 text-center"></p>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
